services:
  nginx:
    image: nginx
    restart: always
    depends_on:
      - blog-backend
      - blog-ui
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 3002:3002
    networks:
      - blog-network

  blog-ui:
    image: shiviraj/blog-ui:0.0.5
    restart: always
    dns:
      - 8.8.8.8
    environment:
      - BACKEND_URL=http://blog-backend:3001
    networks:
      - blog-network

  mongo:
    image: mongo:4.4.18
    restart: always
    ports:
      - ${MONGO_PORT}:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    command: [ "mongod", "--logpath", "/var/log/mongodb/mongod.log", "--logappend" ]
    volumes:
      - mongo-data:/data/db
    networks:
      - blog-network

  blog-backend:
    image: shiviraj/blog-backend:0.0.4
    restart: always
    dns:
      - 8.8.8.8
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/blog?authSource=admin
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  mongo-data: